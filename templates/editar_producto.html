{% extends 'base.html' %}
{% block title %}Editar Producto{% endblock %}

{% block content %}
<a href="/inventario" class="back-link">← Volver al inventario</a>

<h1 style="margin: 16px 0;">✏️ Editar Producto</h1>

<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label for="sku">Código *</label>
  <input type="text" id="sku" name="sku" value="{{ producto['sku'] }}" required>

  <label for="descripcion">Descripción *</label>
  <input type="text" id="descripcion" name="descripcion" value="{{ producto['descripcion'] }}" required>

  <label for="precio">Precio ($) *</label>
  <input type="number" id="precio" name="precio" step="0.01" min="0.01" value="{{ producto['precio'] }}" required>

  <label for="stock">Stock *</label>
  <input type="number" id="stock" name="stock" min="0" value="{{ producto['stock'] }}" required>

  <label for="barcode">Código de Barras</label>
  <input type="text" id="barcode" name="barcode" value="{{ producto['barcode'] }}">

  <button type="submit">💾 Guardar Cambios</button>
</form>
{% endblock %}
