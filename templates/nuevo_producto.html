{% extends 'base.html' %}
{% block title %}Nuevo Producto{% endblock %}

{% block content %}
<a href="/inventario" class="back-link">← Volver al inventario</a>

<h1 style="margin: 16px 0;">➕ Nuevo Producto</h1>

<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label for="sku">Código del producto *</label>
  <input type="text" id="sku" name="sku" required placeholder="Ej: P001">

  <label for="descripcion">Descripción *</label>
  <input type="text" id="descripcion" name="descripcion" required placeholder="Ej: Arroz 1 kg">

  <label for="precio">Precio ($) *</label>
  <input type="number" id="precio" name="precio" step="0.01" min="0.01" required placeholder="Ej: 2.50">

  <label for="costo">Costo ($)</label>
  <small style="display:block; color:#6c757d; margin:-10px 0 8px; font-size:0.85rem;">Precio al que adquirís el producto</small>
  <input type="number" id="costo" name="costo" step="0.01" min="0" placeholder="Ej: 1.50">
  <div id="aviso-costo" style="display:none; color:#856404; background:#fff3cd; border:1px solid #ffc107; border-radius:6px; padding:6px 12px; margin:-10px 0 10px; font-size:0.85rem;">
    ⚠️ El costo supera el precio de venta.
  </div>

  <label for="stock">Stock inicial *</label>
  <input type="number" id="stock" name="stock" min="0" required placeholder="Ej: 100">

  <button type="submit">✅ Guardar Producto</button>
</form>
{% endblock %}

{% block scripts %}
<script>
  function verificarCosto() {
    var costo  = parseFloat(document.getElementById('costo').value)  || 0;
    var precio = parseFloat(document.getElementById('precio').value) || 0;
    document.getElementById('aviso-costo').style.display =
      (costo > 0 && precio > 0 && costo > precio) ? 'block' : 'none';
  }
  document.getElementById('costo').addEventListener('input', verificarCosto);
  document.getElementById('precio').addEventListener('input', verificarCosto);
</script>
{% endblock %}
