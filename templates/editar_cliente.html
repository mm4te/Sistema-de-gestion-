<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editar Cliente</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div class="container">
      <h1>✏️ Editar Cliente</h1>
      <nav>
        <a href="/">Inicio</a>
        <a href="/clientes">Clientes</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <main>
      <a href="/clientes" class="back-link">← Volver a clientes</a>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-messages">
            {% for category, message in messages %}
              <p class="{{ category }}">{{ message }}</p>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="post">
        <label for="nombre">Nombre *</label>
        <input type="text" id="nombre" name="nombre" required value="{{ cliente['nombre'] }}">

        <label for="tipo">Tipo de cliente *</label>
        <select id="tipo" name="tipo" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ccc; margin-bottom:12px;">
          <option value="0" {{ 'selected' if cliente['tipo'] == 0 else '' }}>🛍️ Minorista</option>
          <option value="1" {{ 'selected' if cliente['tipo'] == 1 else '' }}>🏭 Mayorista</option>
        </select>

        <label for="dni">DNI</label>
        <input type="text" id="dni" name="dni" value="{{ cliente['dni'] or '' }}">

        <label for="telefono">Teléfono</label>
        <input type="text" id="telefono" name="telefono" value="{{ cliente['telefono'] or '' }}">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ cliente['email'] or '' }}">

        <label for="cuit">CUIT</label>
        <input type="text" id="cuit" name="cuit" value="{{ cliente['cuit'] or '' }}">

        <button type="submit">💾 Guardar Cambios</button>
      </form>
    </main>
  </div>
</body>
</html>
